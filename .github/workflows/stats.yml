name: GitHub Readme Stats

on:
  schedule:
    - cron: "0 */12 * * *" # Every 12 hours
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=JoaoPec&show_icons=true&theme=tokyonight&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=JoaoPec&layout=compact&theme=tokyonight&hide=html,css&count_private=true
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "docs: update readme stats" || exit 0
          git push
